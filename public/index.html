<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>出退勤管理</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>出退勤管理</h1>
      <div id="current-time" class="current-time"></div>
    </header>

    <!-- 時給設定 -->
    <section class="settings-section">
      <h2>時給設定</h2>
      <div class="settings-card">
        <label>時給（円）:
          <input type="number" id="hourly-wage" min="0" step="1" value="1000">
        </label>
        <button class="btn btn-save" onclick="saveWage()">保存</button>
      </div>
    </section>

    <!-- 今日の勤怠 -->
    <section class="today-section">
      <h2>今日の勤怠</h2>
      <div class="today-card">
        <div class="today-date" id="today-date"></div>
        <div class="today-status">
          <div class="time-block">
            <span class="label">出勤</span>
            <span class="time" id="clock-in-time">--:--:--</span>
          </div>
          <div class="time-block">
            <span class="label">退勤</span>
            <span class="time" id="clock-out-time">--:--:--</span>
          </div>
          <div class="time-block">
            <span class="label">勤務時間</span>
            <span class="time" id="work-duration">--:--</span>
          </div>
        </div>
        <div class="actions">
          <button id="btn-clock-in" class="btn btn-in" onclick="clockIn()">出勤</button>
          <button id="btn-clock-out" class="btn btn-out" onclick="clockOut()" disabled>退勤</button>
        </div>
        <div class="memo-area">
          <textarea id="memo" placeholder="メモ（任意）" rows="2"></textarea>
          <button class="btn btn-memo" onclick="saveMemo()">メモ保存</button>
        </div>
      </div>
    </section>

    <!-- 月別勤怠履歴 -->
    <section class="history-section">
      <h2>月別勤怠履歴</h2>
      <div class="month-nav">
        <button class="btn btn-nav" onclick="prevMonth()">&lt;</button>
        <span id="current-month"></span>
        <button class="btn btn-nav" onclick="nextMonth()">&gt;</button>
      </div>
      <div class="salary-summary" id="salary-summary"></div>
      <div class="summary" id="summary"></div>
      <table class="history-table">
        <thead>
          <tr>
            <th>日付</th>
            <th>曜日</th>
            <th>出勤</th>
            <th>退勤</th>
            <th>勤務時間</th>
            <th>予定</th>
            <th>メモ</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="history-body"></tbody>
      </table>
    </section>
  </div>

  <!-- 編集モーダル -->
  <div class="modal-overlay" id="modal-overlay" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <h3 id="modal-title">記録を編集</h3>
      <input type="hidden" id="edit-date">
      <div class="modal-field">
        <label>出勤時刻</label>
        <input type="time" id="edit-clock-in" step="1">
      </div>
      <div class="modal-field">
        <label>退勤時刻</label>
        <input type="time" id="edit-clock-out" step="1">
      </div>
      <div class="modal-field">
        <label>メモ</label>
        <textarea id="edit-memo" rows="2"></textarea>
      </div>
      <hr style="margin: 12px 0; border: none; border-top: 1px solid #eee;">
      <h4 style="margin-bottom: 8px; color: #555;">予定</h4>
      <div class="modal-field">
        <label>予定出勤</label>
        <input type="time" id="edit-scheduled-in" step="60">
      </div>
      <div class="modal-field">
        <label>予定退勤</label>
        <input type="time" id="edit-scheduled-out" step="60">
      </div>
      <div class="modal-actions">
        <button class="btn btn-cancel" onclick="closeModal()">キャンセル</button>
        <button class="btn btn-in" onclick="saveEdit()">保存</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
